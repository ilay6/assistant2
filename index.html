<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#eff6ff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Помощник">
  <title>Помощник — Заметки и дела</title>
  <link rel="manifest" href="manifest.json">
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,wght@0,400;0,600;0,700;1,400&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #eff6ff;
      --bg-gradient: linear-gradient(160deg, #eff6ff 0%, #dbeafe 50%, #e0e7ff 100%);
      --surface: #ffffff;
      --surface-hover: #f8fafc;
      --accent: #2563eb;
      --accent-light: #3b82f6;
      --accent-soft: rgba(37, 99, 235, 0.08);
      --text: #1e3a5f;
      --text-muted: #64748b;
      --success: #059669;
      --danger: #dc2626;
      --border: #e2e8f0;
      --shadow: 0 1px 3px rgba(0,0,0,0.05);
      --shadow-lg: 0 10px 40px -10px rgba(37, 99, 235, 0.15);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-gradient);
      background-attachment: fixed;
      color: var(--text);
      min-height: 100vh;
      min-height: 100dvh;
      overflow-x: hidden;
      -webkit-tap-highlight-color: transparent;
    }
    .app {
      max-width: 900px;
      margin: 0 auto;
      min-height: 100vh;
      padding: env(safe-area-inset-top) 16px 100px env(safe-area-inset-right);
      padding-left: max(16px, env(safe-area-inset-left));
      padding-bottom: max(100px, calc(80px + env(safe-area-inset-bottom)));
    }
    header {
      padding: 28px 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    h1 { font-size: 1.6rem; font-weight: 700; color: var(--text); letter-spacing: -0.02em; display: flex; align-items: center; gap: 10px; }
    .logo-icon { width: 28px; height: 28px; stroke: var(--accent); }
    .theme-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-muted);
      width: 44px; height: 44px;
      border-radius: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: var(--shadow);
    }
    .theme-btn svg { width: 22px; height: 22px; stroke: currentColor; }
    .tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 28px;
      background: var(--surface);
      padding: 6px;
      border-radius: 18px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      box-shadow: var(--shadow-lg);
      border: 1px solid rgba(255,255,255,0.8);
    }
    .tab {
      flex: 1;
      min-width: 100px;
      padding: 14px 18px;
      border: none;
      background: transparent;
      color: var(--text-muted);
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 600;
      border-radius: 14px;
      cursor: pointer;
      transition: all 0.25s ease;
    }
    .tab.active { background: linear-gradient(135deg, var(--accent), var(--accent-light)); color: white; box-shadow: 0 4px 14px rgba(37, 99, 235, 0.35); }
    .tab:not(.active):hover { background: var(--accent-soft); color: var(--accent); }
    .panel { display: none; }
    .panel.active { display: block; animation: fade 0.3s ease; }
    @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
    .search {
      width: 100%;
      padding: 16px 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      color: var(--text);
      font-size: 1rem;
      margin-bottom: 24px;
      box-shadow: var(--shadow);
      font-family: inherit;
    }
    .search:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
    .search::placeholder { color: var(--text-muted); }
    .add-form {
      display: flex;
      gap: 12px;
      margin-bottom: 28px;
    }
    .add-form input {
      flex: 1;
      padding: 16px 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      color: var(--text);
      font-size: 1rem;
      font-family: inherit;
      box-shadow: var(--shadow);
    }
    .add-form input:focus { outline: none; border-color: var(--accent); }
    .btn {
      padding: 16px 28px;
      background: linear-gradient(135deg, var(--accent), var(--accent-light));
      color: white;
      border: none;
      border-radius: 16px;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 4px 14px rgba(37, 99, 235, 0.3);
    }
    .btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(37, 99, 235, 0.4); }
    .btn-icon {
      width: 52px; height: 52px;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .btn-icon svg { width: 24px; height: 24px; stroke: white; }
    .list { display: flex; flex-direction: column; gap: 14px; }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 20px;
      transition: all 0.25s ease;
      box-shadow: var(--shadow);
    }
    .card:hover { border-color: rgba(37, 99, 235, 0.3); box-shadow: var(--shadow-lg); }
    .card.done .card-title { text-decoration: line-through; color: var(--text-muted); }
    .card-title { font-size: 1.05rem; font-weight: 600; margin-bottom: 4px; }
    .card-meta { font-size: 0.85rem; color: var(--text-muted); }
    .card-actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }
    .card-actions button {
      padding: 10px 16px;
      border: none;
      border-radius: 12px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s;
    }
    .btn-edit { background: var(--accent-soft); color: var(--accent); }
    .btn-edit:hover { background: rgba(37, 99, 235, 0.15); }
    .btn-del { background: rgba(220, 38, 38, 0.08); color: var(--danger); }
    .btn-del:hover { background: rgba(220, 38, 38, 0.15); }
    .empty {
      text-align: center;
      padding: 48px 20px;
      color: var(--text-muted);
      font-size: 1rem;
    }
    .empty-icon {
      width: 64px; height: 64px;
      margin: 0 auto 16px;
      background: var(--accent-soft);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .empty-icon svg { width: 32px; height: 32px; stroke: var(--accent); }
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 100;
      -webkit-backdrop-filter: blur(8px);
      backdrop-filter: blur(8px);
    }
    .modal.show { display: flex; }
    .modal-content {
      background: var(--surface);
      border-radius: 24px;
      padding: 28px;
      width: 100%;
      max-width: 500px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
      border: 1px solid var(--border);
    }
    .modal h3 { margin-bottom: 20px; font-size: 1.25rem; }
    .note-toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 10px 0;
      margin-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }
    .note-toolbar button {
      width: 36px; height: 36px;
      border: 1px solid var(--border);
      background: var(--surface);
      border-radius: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-muted);
      transition: all 0.2s;
    }
    .note-toolbar button:hover { background: var(--accent-soft); color: var(--accent); border-color: var(--accent); }
    .note-toolbar .color-btn { width: 36px; height: 36px; border: 1px solid var(--border); border-radius: 10px; padding: 2px; cursor: pointer; background: var(--surface); }
    .note-editor {
      min-height: 200px;
      padding: 18px;
      background: var(--surface-hover);
      border: 1px solid var(--border);
      border-radius: 16px;
      color: var(--text);
      font-family: 'Source Serif 4', Georgia, serif;
      font-size: 1.05rem;
      line-height: 1.7;
      margin-bottom: 20px;
      outline: none;
    }
    .note-editor:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
    .note-editor h2 { font-size: 1.4rem; margin: 1em 0 0.5em; font-weight: 700; color: var(--text); }
    .note-editor h3 { font-size: 1.2rem; margin: 0.8em 0 0.4em; font-weight: 600; }
    .note-editor p { margin: 0.5em 0; }
    .note-editor .note-cb { display: flex; align-items: center; gap: 10px; margin: 0.6em 0; cursor: pointer; }
    .note-editor .note-cb input { width: 18px; height: 18px; accent-color: var(--accent); cursor: pointer; }
    .note-editor .note-cb.done { color: var(--text-muted); text-decoration: line-through; }
    .note-editor:empty::before { content: attr(data-placeholder); color: var(--text-muted); }
    .modal-btns { display: flex; gap: 12px; justify-content: flex-end; }
    .habit-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
      margin-bottom: 16px;
    }
    .habit-day {
      aspect-ratio: 1;
      border-radius: 14px;
      border: 2px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--text-muted);
      transition: all 0.2s ease;
    }
    .habit-day:hover { border-color: var(--accent); }
    .habit-day.checked { background: linear-gradient(135deg, var(--success), #10b981); border-color: var(--success); color: white; box-shadow: 0 4px 12px rgba(5, 150, 105, 0.3); }
    .install-banner {
      background: linear-gradient(135deg, var(--accent), var(--accent-light));
      color: white;
      padding: 18px 24px;
      border-radius: 20px;
      margin-bottom: 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 14px;
      box-shadow: 0 10px 40px -10px rgba(37, 99, 235, 0.4);
      border: 1px solid rgba(255,255,255,0.2);
    }
    .install-banner.hidden { display: none; }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1 class="logo"><svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="M16 13H8"/><path d="M16 17H8"/><path d="M10 9H8"/></svg>Помощник</h1>
      <button class="theme-btn" id="themeBtn" title="Сменить тему"><svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg><svg class="icon-sun" style="display:none" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg></button>
    </header>

    <div class="install-banner" id="installBanner">
      <span>Установи приложение на домашний экран для удобства</span>
      <div>
        <button class="btn" id="installBtn">Установить</button>
        <button class="btn btn-edit" style="margin-left:8px" id="hideInstall">Позже</button>
      </div>
    </div>

    <nav class="tabs">
      <button class="tab active" data-tab="notes">Заметки</button>
      <button class="tab" data-tab="tasks">Задачи</button>
      <button class="tab" data-tab="habits">Привычки</button>
    </nav>

    <section class="panel active" id="notes">
      <input type="text" class="search" id="notesSearch" placeholder="Поиск заметок...">
      <div class="add-form">
        <input type="text" id="noteTitle" placeholder="Заголовок заметки">
        <button class="btn btn-icon" id="addNote" title="Добавить"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg></button>
      </div>
      <div class="list" id="notesList"></div>
    </section>

    <section class="panel" id="tasks">
      <div class="add-form">
        <input type="text" id="taskInput" placeholder="Новая задача">
        <button class="btn btn-icon" id="addTask" title="Добавить"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg></button>
      </div>
      <div class="list" id="tasksList"></div>
    </section>

    <section class="panel" id="habits">
      <div class="add-form">
        <input type="text" id="habitInput" placeholder="Название привычки">
        <button class="btn btn-icon" id="addHabit" title="Добавить"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg></button>
      </div>
      <div class="list" id="habitsList"></div>
    </section>
  </div>

  <div class="modal" id="noteModal">
    <div class="modal-content modal-note">
      <h3>Редактировать заметку</h3>
      <div class="note-toolbar">
        <button type="button" title="Заголовок 2" data-cmd="formatBlock" data-value="h2">H2</button>
        <button type="button" title="Заголовок 3" data-cmd="formatBlock" data-value="h3">H3</button>
        <button type="button" title="Жирный" data-cmd="bold"><b>B</b></button>
        <button type="button" title="Курсив" data-cmd="italic"><i>I</i></button>
        <button type="button" title="Добавить пункт" data-cmd="checkbox"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><rect x="3" y="3" width="18" height="18" rx="4"/></svg></button>
        <input type="color" class="color-btn" value="#2563eb" data-cmd="foreColor" title="Цвет текста">
      </div>
      <div id="noteBody" class="note-editor" contenteditable="true" data-placeholder="Текст заметки..."></div>
      <div class="modal-btns">
        <button class="btn btn-edit" id="closeNoteModal">Отмена</button>
        <button class="btn" id="saveNote">Сохранить</button>
      </div>
    </div>
  </div>

  <script>
    const STORAGE = {
      notes: 'life_notes',
      tasks: 'life_tasks',
      habits: 'life_habits',
      theme: 'life_theme',
      installed: 'life_installed'
    };

    function load(key, def = []) {
      try {
        const v = localStorage.getItem(key);
        return v ? JSON.parse(v) : def;
      } catch { return def; }
    }
    function save(key, val) {
      localStorage.setItem(key, JSON.stringify(val));
    }

    // === Notes ===
    let notes = load(STORAGE.notes);
    let editingNoteId = null;

    function stripHtml(html) {
      const d = document.createElement('div');
      d.innerHTML = html || '';
      return d.textContent || d.innerText || '';
    }
    function renderNotes(filter = '') {
      const list = document.getElementById('notesList');
      const q = filter.toLowerCase();
      const items = filter ? notes.filter(n => n.title.toLowerCase().includes(q) || stripHtml(n.body || '').toLowerCase().includes(q)) : notes;
      list.innerHTML = items.length ? items.map(n => `
        <div class="card" data-id="${n.id}">
          <div class="card-title">${escapeHtml(n.title)}</div>
          <div class="card-meta">${escapeHtml(stripHtml(n.body || '').slice(0, 80))}${stripHtml(n.body||'').length > 80 ? '...' : ''}</div>
          <div class="card-actions">
            <button class="btn-edit" onclick="openNote('${n.id}')">Редактировать</button>
            <button class="btn-del" onclick="deleteNote('${n.id}')">Удалить</button>
          </div>
        </div>
      `).join('') : '<div class="empty"><div class="empty-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></div>Заметок пока нет</div>';
    }

    function escapeHtml(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    function openNote(id) {
      const n = notes.find(x => x.id === id);
      if (!n) return;
      editingNoteId = id;
      const ed = document.getElementById('noteBody');
      ed.innerHTML = n.body || '';
      bindNoteCheckboxes(ed);
      document.getElementById('noteModal').classList.add('show');
      ed.focus();
    }
    function bindNoteCheckboxes(container) {
      (container || document).querySelectorAll('.note-cb input[type="checkbox"]').forEach(cb => {
        cb.onclick = (e) => { e.target.closest('.note-cb').classList.toggle('done', e.target.checked); };
      });
    }

    function deleteNote(id) {
      notes = notes.filter(n => n.id !== id);
      save(STORAGE.notes, notes);
      renderNotes(document.getElementById('notesSearch').value);
    }

    document.getElementById('notesSearch').oninput = (e) => renderNotes(e.target.value);
    const addNoteFn = () => {
      const title = document.getElementById('noteTitle').value.trim();
      if (!title) return;
      notes.unshift({ id: crypto.randomUUID(), title, body: '', createdAt: Date.now() });
      save(STORAGE.notes, notes);
      document.getElementById('noteTitle').value = '';
      renderNotes();
    };
    document.getElementById('addNote').onclick = addNoteFn;
    document.getElementById('noteTitle').onkeydown = (e) => { if (e.key === 'Enter') addNoteFn(); };
    document.getElementById('closeNoteModal').onclick = () => {
      document.getElementById('noteModal').classList.remove('show');
      editingNoteId = null;
    };
    document.getElementById('saveNote').onclick = () => {
      const ed = document.getElementById('noteBody');
      ed.querySelectorAll('.note-cb').forEach(lbl => {
        const cb = lbl.querySelector('input');
        if (cb && cb.checked) cb.setAttribute('checked', '');
        else if (cb) cb.removeAttribute('checked');
      });
      const body = ed.innerHTML.trim();
      const n = notes.find(x => x.id === editingNoteId);
      if (n) { n.body = body; save(STORAGE.notes, notes); renderNotes(); }
      document.getElementById('noteModal').classList.remove('show');
      editingNoteId = null;
    };
    document.querySelector('.note-toolbar').addEventListener('click', (e) => {
      const btn = e.target.closest('button[data-cmd]');
      if (!btn) return;
      const cmd = btn.dataset.cmd, val = btn.dataset.value;
      document.getElementById('noteBody').focus();
      if (cmd === 'checkbox') {
        document.execCommand('insertHTML', false, '<label class="note-cb"><input type="checkbox"> Пункт</label><br>');
        bindNoteCheckboxes();
      } else if (cmd === 'formatBlock') {
        document.execCommand('formatBlock', false, val);
      } else {
        document.execCommand(cmd, false, null);
      }
    });
    document.querySelector('.note-toolbar .color-btn').addEventListener('input', (e) => {
      document.getElementById('noteBody').focus();
      document.execCommand('foreColor', false, e.target.value);
    });

    // === Tasks ===
    let tasks = load(STORAGE.tasks);

    function renderTasks() {
      const list = document.getElementById('tasksList');
      list.innerHTML = tasks.length ? tasks.map(t => `
        <div class="card ${t.done ? 'done' : ''}" data-id="${t.id}">
          <div class="card-title">${escapeHtml(t.text)}</div>
          <div class="card-actions">
            <button class="btn-edit" onclick="toggleTask('${t.id}')">${t.done ? 'Вернуть' : 'Готово'}</button>
            <button class="btn-del" onclick="deleteTask('${t.id}')">Удалить</button>
          </div>
        </div>
      `).join('') : '<div class="empty"><div class="empty-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="M22 4L12 14.01l-3-3"/></svg></div>Задач пока нет</div>';
    }

    function toggleTask(id) {
      const t = tasks.find(x => x.id === id);
      if (t) { t.done = !t.done; save(STORAGE.tasks, tasks); renderTasks(); }
    }
    function deleteTask(id) {
      tasks = tasks.filter(t => t.id !== id);
      save(STORAGE.tasks, tasks);
      renderTasks();
    }

    const addTaskFn = () => {
      const text = document.getElementById('taskInput').value.trim();
      if (!text) return;
      tasks.unshift({ id: crypto.randomUUID(), text, done: false, createdAt: Date.now() });
      save(STORAGE.tasks, tasks);
      document.getElementById('taskInput').value = '';
      renderTasks();
    };
    document.getElementById('addTask').onclick = addTaskFn;
    document.getElementById('taskInput').onkeydown = (e) => { if (e.key === 'Enter') addTaskFn(); };

    // === Habits ===
    let habits = load(STORAGE.habits);
    const DAYS = ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];

    function renderHabits() {
      const list = document.getElementById('habitsList');
      const today = new Date().toDateString();
      list.innerHTML = habits.length ? habits.map(h => {
        const week = h.dates || {};
        const cells = DAYS.map((d, i) => {
          const d2 = new Date();
          d2.setDate(d2.getDate() - (6 - i));
          const k = d2.toDateString();
          const checked = week[k];
          return `<div class="habit-day ${checked ? 'checked' : ''}" data-hid="${h.id}" data-date="${k}">${checked ? '✓' : d}</div>`;
        }).join('');
        return `
          <div class="card" data-id="${h.id}">
            <div class="card-title">${escapeHtml(h.name)}</div>
            <div class="habit-grid">${cells}</div>
            <button class="btn-del" type="button" onclick="deleteHabit('${h.id}')">Удалить</button>
          </div>
        `;
      }).join('') : '<div class="empty"><div class="empty-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></svg></div>Привычек пока нет</div>';
      list.querySelectorAll('.habit-day').forEach(el => {
        el.onclick = () => {
          const hid = el.dataset.hid;
          const date = el.dataset.date;
          const h = habits.find(x => x.id === hid);
          if (!h) return;
          h.dates = h.dates || {};
          h.dates[date] = !h.dates[date];
          save(STORAGE.habits, habits);
          renderHabits();
        };
      });
    }

    function deleteHabit(id) {
      habits = habits.filter(h => h.id !== id);
      save(STORAGE.habits, habits);
      renderHabits();
    }

    const addHabitFn = () => {
      const name = document.getElementById('habitInput').value.trim();
      if (!name) return;
      habits.unshift({ id: crypto.randomUUID(), name, dates: {}, createdAt: Date.now() });
      save(STORAGE.habits, habits);
      document.getElementById('habitInput').value = '';
      renderHabits();
    };
    document.getElementById('addHabit').onclick = addHabitFn;
    document.getElementById('habitInput').onkeydown = (e) => { if (e.key === 'Enter') addHabitFn(); };

    // === Tabs ===
    document.querySelectorAll('.tab').forEach(tab => {
      tab.onclick = () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById(tab.dataset.tab).classList.add('active');
      };
    });

    // === Theme ===
    const savedTheme = localStorage.getItem(STORAGE.theme) || 'light';
    document.documentElement.setAttribute('data-theme', savedTheme);
    function applyDarkTheme() {
      document.body.style.setProperty('--bg', '#0f172a');
      document.body.style.setProperty('--bg-gradient', 'linear-gradient(160deg, #0f172a 0%, #1e293b 50%, #0f172a 100%)');
      document.body.style.setProperty('--surface', '#1e293b');
      document.body.style.setProperty('--surface-hover', '#334155');
      document.body.style.setProperty('--text', '#f1f5f9');
      document.body.style.setProperty('--text-muted', '#94a3b8');
      document.body.style.setProperty('--border', 'rgba(255,255,255,0.1)');
      document.querySelector('#themeBtn .icon-moon').style.display = 'none';
      document.querySelector('#themeBtn .icon-sun').style.display = 'block';
    }
    function applyLightTheme() {
      document.body.style.removeProperty('--bg');
      document.body.style.removeProperty('--bg-gradient');
      document.body.style.removeProperty('--surface');
      document.body.style.removeProperty('--surface-hover');
      document.body.style.removeProperty('--text');
      document.body.style.removeProperty('--text-muted');
      document.body.style.removeProperty('--border');
      document.querySelector('#themeBtn .icon-moon').style.display = 'block';
      document.querySelector('#themeBtn .icon-sun').style.display = 'none';
    }
    if (savedTheme === 'dark') applyDarkTheme();
    document.getElementById('themeBtn').onclick = () => {
      const isLight = document.documentElement.getAttribute('data-theme') === 'light';
      if (isLight) {
        applyDarkTheme();
        save(STORAGE.theme, 'dark');
        document.documentElement.setAttribute('data-theme', 'dark');
      } else {
        applyLightTheme();
        save(STORAGE.theme, 'light');
        document.documentElement.setAttribute('data-theme', 'light');
      }
    };

    // === PWA Install ===
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', e => {
      e.preventDefault();
      deferredPrompt = e;
    });
    if (load(STORAGE.installed)) document.getElementById('installBanner').classList.add('hidden');
    document.getElementById('hideInstall').onclick = () => {
      document.getElementById('installBanner').classList.add('hidden');
      save(STORAGE.installed, true);
    };
    document.getElementById('installBtn').onclick = async () => {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        if (outcome === 'accepted') { save(STORAGE.installed, true); document.getElementById('installBanner').classList.add('hidden'); }
      }
    };

    renderNotes();
    renderTasks();
    renderHabits();
  </script>
</body>
</html>
